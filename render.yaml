# ─────────────────────────────────────────────────
#  Face Auth — Render.com Deployment Blueprint
# ─────────────────────────────────────────────────
# Deploy: Push to GitHub → Connect repo on render.com
# Render reads this file and auto-configures services.

services:
  # ── Backend API ──
  - type: web
    name: face-auth-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /api/auth/health
    envVars:
      - key: APP_NAME
        value: "Face Auth API"
      - key: APP_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: MONGODB_URL
        sync: false  # Set manually in Render dashboard
      - key: MONGODB_DB_NAME
        value: "face_auth_db"
      - key: JWT_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: FACE_SIMILARITY_THRESHOLD
        value: "0.50"
      - key: MAX_FACE_IMAGES
        value: "4"
      - key: EMBEDDING_ENCRYPTION_KEY
        generateValue: true
      - key: RATE_LIMIT_REQUESTS
        value: "100"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: CORS_ORIGINS
        sync: false  # Set to your Vercel frontend URL in Render dashboard
      - key: LOG_LEVEL
        value: "INFO"
      - key: PORT
        value: "8000"
